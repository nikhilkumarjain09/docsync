name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: docsync
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @docsync/db run db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docsync

      - name: Push database schema
        run: pnpm --filter @docsync/db run db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docsync

      - name: Run linting
        run: pnpm lint

      - name: Run builds & typecheck
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docsync
          AUTH_SECRET: supersecretauthsecrettokensecrettoken
          WS_RELAY_URL: ws://localhost:4444

      - name: Run unit & integration tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/docsync
          AUTH_SECRET: supersecretauthsecrettokensecrettoken
          WS_RELAY_URL: ws://localhost:4444
